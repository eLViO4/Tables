<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Kharkiv</title>

    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #3f0d21;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ================= NAVBAR ================= */
        .navbar-custom {
            background: #ffbf00;
            height: 68px;
            border-bottom: 3px solid #2b080e;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .nav-link {
            color: #3f0d21 !important;
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
        }

        /* ================= PAGE ================= */
        .page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px;          /* симметрично */
            text-align: center;
        }

        /* ================= GRID ================= */
        .buttons-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* ПК */
            gap: 30px;
            justify-content: center; /* центр всей сетки */
            justify-items: center;   /* центр карточек */
        }

        /* ================= CARD ================= */
        .square-box {
            width: 220px;
            aspect-ratio: 1 / 1;
            background: linear-gradient(135deg, #ffffff, #fff7ed);
            border-radius: 16px;
            border: 3px solid #e8a614;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #2b080e;
            transition: transform 0.35s, box-shadow 0.35s;
        }

        /* ИСПРАВЛЕНО: Текст остается бордовым и аккуратно подчеркивается */
        .square-box:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 14px 35px rgba(43, 8, 14, 0.6);
            color: #3f0d21;
            text-decoration: none;
        }

        /* IMAGE */
        .square-icon {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        /* TEXT */
        .square-title {
            font-size: 1.2em;
            font-weight: 800;
        }

        /* ================= ADAPTIVE ================= */

        /* Планшет */
        @media (max-width: 900px) {
            .buttons-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }

            .square-box {
                width: 180px;
            }

            .square-icon {
                width: 70px;
                height: 70px;
            }
        }

        /* Телефон */
        @media (max-width: 600px) {
            .buttons-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .square-box {
                width: 160px;
            }

            .square-icon {
                width: 56px;
                height: 56px;
            }

            .square-title {
                font-size: 0.9rem;
            }
        }

        /* Маленький экран */
        @media (max-width: 360px) {
            .buttons-container {
                grid-template-columns: 1fr;
            }

            .square-box {
                width: 140px;
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-custom">
    <a href="../../../index.html" class="nav-link">HOME</a>
</nav>

<div class="page-container">
    <br>
    <h1><img src="../images/FCKharkiv.png" width="140"></h1>
    <br>

    <div class="buttons-container">
        <a href="League/2026-27.html" class="square-box">
            <img src="../../UkraineTables/images/upl.png" alt="League" class="square-icon">
            <div class="square-title">League</div>
        </a>

        <a href="Eurocups/2014-15.html" class="square-box">
            <img src="../../../images/UCL_logo.png" alt="Eurocups" class="square-icon">
            <div class="square-title">Eurocups</div>
        </a>

        <a href="Cup.html" class="square-box">
            <img src="../../UkraineTables/images/ukrcup.webp" alt="Cup" class="square-icon">
            <div class="square-title">Cup</div>
        </a>

        <a href="../Seasons/FC_Kharkiv.html" class="square-box">
            <img src="../../../images/statistics.png" alt="Archives" class="square-icon">
            <div class="square-title">Seasons</div>
        </a>
    </div>
</div>

</body>
</html>
