<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metalist 1925</title>

    <!-- Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffc123;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ================= NAVBAR ================= */
        .navbar-custom {
            background: #00426b;
            height: 68px;
            border-bottom: 3px solid #ffc123;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .nav-link {
            color: #ffc123 !important;
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
        }

        /* ================= PAGE ================= */
        .page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px;
            text-align: center;
        }

        /* ================= GRID ================= */
        .buttons-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 колонки для ПК, так как нет еврокубков */
            gap: 30px;
            justify-content: center;
            justify-items: center;
            margin-top: 20px;
        }

        /* ================= CARD ================= */
        .square-box {
            width: 220px;
            aspect-ratio: 1 / 1;
            background: linear-gradient(135deg, #ffffff, #fff7ed);
            border-radius: 16px;
            border: 3px solid #00426b;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #00426b;
            transition: transform 0.35s, box-shadow 0.35s;
        }

        .square-box:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 14px 35px rgba(0,66,107,0.35);
            text-decoration: none;
            color: #00426b;
        }

        /* IMAGE */
        .square-icon {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        /* TEXT */
        .square-title {
            font-size: 1.2em;
            font-weight: 800;
        }

        /* ================= ADAPTIVE ================= */

        /* Планшет */
        @media (max-width: 900px) {
            .buttons-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }

            .square-box {
                width: 180px;
            }

            .square-icon {
                width: 70px;
                height: 70px;
            }
        }

        /* Телефон */
        @media (max-width: 600px) {
            .buttons-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .square-box {
                width: 160px;
            }

            .square-icon {
                width: 56px;
                height: 56px;
            }

            .square-title {
                font-size: 0.9rem;
            }
        }

        /* Маленький экран */
        @media (max-width: 360px) {
            .buttons-container {
                grid-template-columns: 1fr;
            }

            .square-box {
                width: 140px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-custom">
    <a href="../../../../index.html" class="nav-link">HOME</a>
</nav>

<div class="page-container">
    <br>
    <h1><img src="../../images/M1925.png" width="120"></h1>
    <br>

    <div class="buttons-container">
        <!-- League Results -->
        <a href="../Metalist1925/2025-26.html" class="square-box">
            <img src="../../../UkraineTables/images/upl.png" alt="League Results" class="square-icon">
            <div class="square-title">League</div>
        </a>

        <!-- Cup Results -->
        <a href="CupMetalist1925.html" class="square-box">
            <img src="../../../UkraineTables/images/ukrcup.webp" alt="Cup Results" class="square-icon">
            <div class="square-title">Cup</div>
        </a>

        <!-- Seasons / Statistics -->
        <a href="../../Seasons/Metalist1925.html" class="square-box">
            <img src="../../../../images/statistics.png" alt="Seasons" class="square-icon">
            <div class="square-title">Seasons</div>
        </a>
    </div>
</div>

</body>
</html>
